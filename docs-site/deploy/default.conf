# Static nginx for the Kachō Registry Docusaurus docs-site (build/ output, routeBasePath '/').
# NO SPA fallback (each route is a real index.html), NO proxy_pass.

map $sent_http_content_type $docs_cache_control {
    default                     "no-store";
    "~*text/html"               "no-store";
    "~*application/javascript"  "public, max-age=31536000, immutable";
    "~*text/css"                "public, max-age=31536000, immutable";
    "~*font/"                   "public, max-age=31536000, immutable";
    "~*application/font"        "public, max-age=31536000, immutable";
    "~*image/"                  "public, max-age=86400";
}

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;

    add_header Cache-Control $docs_cache_control always;
    add_header X-Content-Type-Options nosniff always;

    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/css application/javascript application/json
                      image/svg+xml text/plain application/xml;
}
