syntax = "proto3";

package kacho.cloud.registry.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho-registry/proto/gen/go/kacho/cloud/registry/v1;registryv1";

// InternalRegistryService — cluster-internal admin-RPC (порт 9091; ban #6).
// НЕ публикуется на external endpoint. Обслуживает эксплуатацию: GC zot-стора и
// внутренняя статистика namespace (blob/размер — инфра-данные, security.md).
//
// AuthN+AuthZ ВЕЗДЕ (инвариант security.md): per-RPC InternalIAMService.Check
// энфорсится и здесь (mTLS + authz-Check, НЕ exempt). Внутренний периметр не
// доверенный.
service InternalRegistryService {
  // TriggerGarbageCollection — async GC namespace реестра в zot (удаление
  // недостижимых блобов/манифестов). Admin-tier на registry_registry.
  rpc TriggerGarbageCollection(TriggerGarbageCollectionRequest) returns (operation.Operation) {
    option (kacho.cloud.api.operation) = {
      metadata: "TriggerGarbageCollectionMetadata"
      response: "GarbageCollectionResult"
    };
    option (kacho.iam.authz.v1.permission) = "registry.registries.gc";
    option (kacho.iam.authz.v1.required_relation) = "admin";
    option (kacho.iam.authz.v1.scope_extractor) = {
      object_type: "registry_registry"
      from_request_field: "registry_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "2";
  }

  // GetRegistryStats — sync-статистика namespace (repo/tag count, суммарный
  // размер, число уникальных блобов). Инфра-проекция, только :9091. Viewer-tier.
  rpc GetRegistryStats(GetRegistryStatsRequest) returns (RegistryStats) {
    option (kacho.iam.authz.v1.permission) = "registry.registries.getStats";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor) = {
      object_type: "registry_registry"
      from_request_field: "registry_id"
    };
    option (kacho.iam.authz.v1.required_acr_min) = "2";
  }
}

message TriggerGarbageCollectionRequest {
  string registry_id = 1;
}

message TriggerGarbageCollectionMetadata {
  string registry_id = 1;
}

message GarbageCollectionResult {
  string registry_id = 1;
  int64 blobs_removed = 2;
  int64 bytes_reclaimed = 3;
}

message GetRegistryStatsRequest {
  string registry_id = 1;
}

// RegistryStats — инфра-проекция namespace (только :9091, security.md).
message RegistryStats {
  string registry_id = 1;
  int32 repository_count = 2;
  int32 tag_count = 3;
  int64 total_size_bytes = 4;
  int64 blob_count = 5;
  google.protobuf.Timestamp last_gc_at = 6;
}
