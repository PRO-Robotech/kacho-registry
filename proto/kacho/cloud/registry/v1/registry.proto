syntax = "proto3";

package kacho.cloud.registry.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/PRO-Robotech/kacho-registry/proto/gen/go/kacho/cloud/registry/v1;registryv1";

// Registry — тенант-namespace OCI/Docker-реестра Kachō.
//
// Плоский ресурс (без K8s-envelope). Registry — НЕ отдельный инстанс движка, а
// namespace над общим zot-бэкендом: клиент адресует образ как
// `registry.kacho.local/<registry-id>/<repo>:tag`. Метаданные namespace хранит
// kacho-registry; сами блобы/манифесты — в zot (S3-backed). Образы/теги в БД не
// хранятся — это read-only проекция из zot (см. Repository/Tag).
//
// project_id — cross-domain ссылка на iam.Project (TEXT, без FK, валидируется
// через iam.ProjectService.Get на Create). Owner-иерархия в FGA пишется через
// fga-proxy (RegisterResource), object-type `registry_registry`.
message Registry {
  // ID реестра. Prefix "reg" (kacho-corelib/ids.NewID). Immutable PK.
  string id = 1;

  // ID project-владельца (iam). Immutable после Create.
  string project_id = 2;

  // Момент создания (truncate до секунд в ответе).
  google.protobuf.Timestamp created_at = 3;

  // Имя реестра — DNS-safe, UNIQUE в рамках project (partial UNIQUE WHERE
  // status<>'DELETING'). Mutable через Update (смена не трогает endpoint/zot по id).
  string name = 4;

  // Описание (mutable через Update).
  string description = 5;

  // Метки — участвуют в authz label-scoping (mutable через Update).
  map<string, string> labels = 6;

  // Output-only: базовый OCI-endpoint namespace, напр. registry.kacho.local/<id>.
  string endpoint = 7;

  // Output-only: число repositories в namespace (проекция из zot, не источник истины).
  int32 repository_count = 8;

  // Состояние жизненного цикла.
  RegistryStatus status = 10;
}

// RegistryStatus — терминальность DELETING обязательна (forward-only delete):
// revert DELETING→ACTIVE запрещён, иначе partial-UNIQUE(project,name) конфликтует
// с re-Create нового ACTIVE того же (project,name).
enum RegistryStatus {
  REGISTRY_STATUS_UNSPECIFIED = 0;
  REGISTRY_STATUS_ACTIVE = 1;
  REGISTRY_STATUS_DELETING = 2;
}

// ArtifactType — тип OCI-артефакта образа, классифицированный по config.mediaType
// репрезентативного манифеста (и top-level mediaType для multi-arch index).
// Дискриминатор docker-образа от helm-чарта: оба несут одинаковый top-level
// manifest media-type, различие только в config.mediaType.
enum ArtifactType {
  ARTIFACT_TYPE_UNSPECIFIED = 0;  // не классифицирован (нет тегов / манифест непрочитан)
  ARTIFACT_TYPE_CONTAINER_IMAGE = 1;  // docker/OCI контейнерный образ (вкл. multi-arch index)
  ARTIFACT_TYPE_HELM_CHART = 2;  // Helm-чарт (config vnd.cncf.helm.config)
  ARTIFACT_TYPE_OTHER = 3;  // иной OCI-артефакт (SBOM/WASM/signature/…)
}

// Repository — OCI-репозиторий (образ) внутри namespace. Read-only проекция из
// zot (source of truth = zot), НЕ хранится в БД kacho-registry. Per-repo authz
// object-type `registry_repository` (parent registry_registry).
message Repository {
  // ID реестра-владельца.
  string registry_id = 1;

  // Имя репозитория внутри namespace (напр. "backend/api").
  string name = 2;

  // Число тегов.
  int32 tag_count = 3;

  // Суммарный размер (байт) уникальных блобов репозитория.
  int64 size_bytes = 4;

  // Момент последнего push в репозиторий (last-pushed).
  google.protobuf.Timestamp updated_at = 5;

  // Output-only: доминирующий тип артефакта (первый из artifact_types) — для
  // обратной совместимости фильтра. Полный набор — в artifact_types.
  ArtifactType artifact_type = 6;

  // Output-only: НАБОР типов артефактов среди тегов репозитория. Репозиторий может
  // одновременно содержать контейнерные образы И helm-чарты (mixed) — тогда набор
  // несёт оба значения. Пустой набор — нет тегов / не классифицировано.
  repeated ArtifactType artifact_types = 11;

  // Output-only: момент последнего pull любого тега репозитория (last-pulled).
  // Нулевой timestamp — ни один тег ещё не скачивался.
  google.protobuf.Timestamp last_pulled_at = 12;

  // Output-only: суммарное число скачиваний тегов репозитория (zot download-count).
  int64 download_count = 13;
}

// Tag — тегированный образ (манифест) в репозитории. Read-only проекция из zot.
message Tag {
  // ID реестра-владельца.
  string registry_id = 1;

  // Имя репозитория.
  string repository = 2;

  // Тег (напр. "v1.2.0", "latest").
  string tag = 3;

  // Digest манифеста (sha256:...).
  string digest = 4;

  // Размер манифеста + слоёв (байт).
  int64 size_bytes = 5;

  // MediaType манифеста (OCI image / artifact / index).
  string media_type = 6;

  // Момент создания образа (из image-config, поле "created"). Пусто, если config
  // его не несёт (напр. минимальный образ) или артефакт не контейнерный (helm).
  google.protobuf.Timestamp created_at = 7;

  // Платформа образа "<os>/<arch>" (напр. "linux/amd64"); для multi-arch index —
  // "multi-arch"; для helm-чарта / неизвестного — пусто.
  string architecture = 8;

  // Output-only: момент последнего pull тега (last-pulled). Нулевой timestamp —
  // тег ещё не скачивался.
  google.protobuf.Timestamp last_pulled_at = 9;

  // Output-only: субъект последнего push (zot pushed-by), если известен.
  string pushed_by = 10;

  // Output-only: число скачиваний тега (zot download-count).
  int64 download_count = 11;
}
