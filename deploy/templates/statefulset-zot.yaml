{{- if .Values.zot.enabled }}
{{/*
zot OCI storage backend for kacho-registry — the data-plane proxies pushes/pulls here
and the zot adapter reads Repository/Tag projections via the zot search extension
(POST /v2/_zot/ext/search). zot is NEVER publicly reachable: only the cluster-internal
`{{ .Values.zot.serviceName }}` Service (registry dials http://<svc>:<port>). A PVC
(volumeClaimTemplates) holds the OCI blob storage.

NOTE: the search/GraphQL extension MUST be present in the image — use the
extensions-enabled zot variant (values.zot.image), not zot-minimal.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.zot.serviceName }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.zot.serviceName }}
{{- /*
  config.json is assembled as a dict → toJson so it is ALWAYS valid JSON regardless
  of which optional blocks (s3 storageDriver / redirectBlobURL / http.compat) are on
  — no fragile manual comma juggling. Placement matters for zot:
    - compat → under `http` (NOT top-level; zot rejects a top-level `compat` key).
    - storageDriver (s3) + redirectBlobURL → under `storage`.
  With remote (s3) storage, zot dedup needs a REMOTE cache DB (dynamodb); a local
  boltdb cache is rejected — so dedupe stays whatever values say (false for s3).
*/}}
{{- $storage := dict "rootDirectory" .Values.zot.storage.path "dedupe" (.Values.zot.storage.dedupe | default false) }}
{{- if .Values.zot.storage.redirectBlobURL }}{{- $_ := set $storage "redirectBlobURL" true }}{{- end }}
{{- if .Values.zot.storage.s3.enabled }}
{{-   $s3 := .Values.zot.storage.s3 }}
{{-   $_ := set $storage "storageDriver" (dict "name" "s3" "region" $s3.region "regionendpoint" $s3.regionEndpoint "bucket" $s3.bucket "rootdirectory" $s3.rootDirectory "secure" (default true $s3.secure) "forcepathstyle" (default true $s3.forcePathStyle)) }}
{{- end }}
{{- $http := dict "address" "0.0.0.0" "port" (.Values.zot.port | toString) }}
{{- with .Values.zot.compat }}{{- $_ := set $http "compat" . }}{{- end }}
{{- $cfg := dict "distSpecVersion" "1.1.0" "storage" $storage "http" $http "log" (dict "level" "info") "extensions" (dict "search" (dict "enable" true)) }}
data:
  config.json: |
    {{- $cfg | toJson | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.zot.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.zot.serviceName }}
spec:
  selector:
    app: {{ .Values.zot.serviceName }}
  ports:
    - name: http
      port: {{ .Values.zot.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.zot.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.zot.serviceName }}
spec:
  serviceName: {{ .Values.zot.serviceName }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.zot.serviceName }}
  template:
    metadata:
      labels:
        app: {{ .Values.zot.serviceName }}
    spec:
      securityContext:
        {{- toYaml .Values.zot.podSecurityContext | nindent 8 }}
      containers:
        - name: zot
          image: "{{ include "registry.zotImage" . }}"
          imagePullPolicy: {{ .Values.zot.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.zot.containerSecurityContext | nindent 12 }}
          args: ["serve", "/etc/zot/config.json"]
          {{- if and .Values.zot.storage.s3.enabled .Values.zot.storage.s3.existingSecret }}
          # S3 credentials (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) for the zot S3
          # storageDriver — via the aws-sdk env credential chain, NEVER in config.json
          # (ConfigMap) or values (git). Provisioned as a K8s Secret out-of-band.
          envFrom:
            - secretRef:
                name: {{ .Values.zot.storage.s3.existingSecret }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.zot.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
            - name: storage
              mountPath: {{ .Values.zot.storage.path }}
          resources:
            {{- toYaml .Values.zot.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Values.zot.serviceName }}-config
        {{- if not .Values.zot.storage.persistence }}
        # No PVC: clusters without a dynamic StorageClass (e.g. fe3455) use an
        # ephemeral emptyDir for OCI blobs — mirrors the pg persistence.enabled=false
        # posture. Blobs are lost on pod restart; acceptable for a greenfield stand.
        - name: storage
          emptyDir: {}
        {{- end }}
  {{- if .Values.zot.storage.persistence }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.zot.storage.storageClassName }}
        storageClassName: {{ .Values.zot.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.zot.storage.size }}
  {{- end }}
{{- end }}
