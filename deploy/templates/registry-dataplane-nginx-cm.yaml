{{/*
nginx-конфиг data-plane TLS-sidecar. Терминирует TLS на :8443 (server-cert из
секрета registry-dataplane-tls) и маршрутизирует:
  - `/iam/token` → iam registry-token shim (:9096) — Docker Registry v2 token-endpoint,
    куда docker идёт за Bearer-токеном по WWW-Authenticate realm;
  - `/` → data-plane OCI-прокси registry (127.0.0.1:8080), плейнтекст в том же pod.
registry-iam-jwks-unify — sidecar БОЛЬШЕ НЕ проксирует `/.well-known/jwks.json`: JWKS-
верификация тянет ключи напрямую из cluster-internal kacho-iam JWKS-proxy (:9097, TLS),
доверие к internal-CA — через SSL_CERT_DIR (см. deployment.yaml). Upstream iam-token-shim
параметризован через values (tlsSidecar.iamTokenShimUpstream); loopback на data-plane
фиксирован (один pod). Рендерится только при включённом LB + TLS-sidecar.
*/}}
{{- if and .Values.service.dataplaneLB.enabled .Values.service.dataplaneLB.tlsSidecar.enabled }}
{{- $s := .Values.service.dataplaneLB.tlsSidecar }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-dataplane-nginx
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: {{ .Values.name }}
    app.kubernetes.io/component: registry-dataplane-nginx
    app.kubernetes.io/managed-by: helm
data:
  default.conf: |
    server {
      listen 8443 ssl;
      http2 on;
      server_name registry.in-cloud.io _;
      ssl_certificate     /etc/registry-tls/tls.crt;
      ssl_certificate_key /etc/registry-tls/tls.key;
      client_max_body_size 0;
      chunked_transfer_encoding on;
      # Docker Registry v2 token endpoint → iam registry-token shim (:9096).
      location = /iam/token {
        proxy_pass http://{{ $s.iamTokenShimUpstream }}/iam/token;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
      }
      # OCI data-plane (/v2/…) → registry data-plane (:8080).
      location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 900s;
        proxy_request_buffering off;
        proxy_buffering off;
      }
    }
{{- end }}
