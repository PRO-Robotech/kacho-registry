{{/*
TLS-серверный cert для data-plane nginx-sidecar. docker требует https для
non-localhost registry; sidecar терминирует TLS этим цертом на :8443 и проксирует
в плейнтекстовый data-plane (:8080).

Issuer / имена / SAN параметризованы через `service.dataplaneLB.tlsSidecar.cert`: серт
предъявляется ДОКЕР-КЛИЕНТУ, поэтому публичный VIP требует публично-доверенного issuer'а
(Let's Encrypt) — дефолтный kacho-internal-ca годится только для in-cluster/dev-клиентов,
которым роздан internal-CA. Публичный CA не подписывает commonName/ipAddresses и навязывает
свою keyalg-политику → эти поля рендерятся ТОЛЬКО когда непусты (values.yaml, секция cert).

Секрет (`cert.secretName`) монтируется в sidecar как tls.crt/tls.key. Его ключ ca.crt
служит registry-контейнеру internal-CA trust-anchor'ом ТОЛЬКО при mtls.enable=false; в prod
(mtls.enable=true) trust-anchor берётся из mtls.serverSecretName (см. volume internal-ca в
deployment.yaml) — поэтому увод ЭТОГО серта на публичный CA не ломает JWKS-верификацию
iam :9097.

Рендерится ТОЛЬКО при включённом data-plane LB + TLS-sidecar (dev/local без LB не
затрагивается).
*/}}
{{- if and .Values.service.dataplaneLB.enabled .Values.service.dataplaneLB.tlsSidecar.enabled }}
{{- $c := .Values.service.dataplaneLB.tlsSidecar.cert }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $c.name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: {{ .Values.name }}
    app.kubernetes.io/component: registry-dataplane-tls
    app.kubernetes.io/managed-by: helm
spec:
  secretName: {{ $c.secretName | quote }}
  duration: {{ $c.duration | quote }}
  renewBefore: {{ $c.renewBefore | quote }}
  privateKey:
    {{- with $c.privateKey.algorithm }}
    algorithm: {{ . }}
    {{- end }}
    {{- with $c.privateKey.size }}
    size: {{ . }}
    {{- end }}
    rotationPolicy: Always
  issuerRef:
    name: {{ $c.issuerRef.name | quote }}
    kind: {{ $c.issuerRef.kind | quote }}
    group: cert-manager.io
  {{- with $c.commonName }}
  commonName: {{ . | quote }}
  {{- end }}
  dnsNames:
    {{- toYaml $c.dnsNames | nindent 4 }}
  {{- with $c.ipAddresses }}
  ipAddresses:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $c.usages }}
  usages:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
